<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/Movies.png') }}">
    <title>Connexion - Movies For You</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
</head>
<body>
    <div class="container">
        <div class="admin-box">
            <h1>S'identifier</h1>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div style="color: #ff4d4d; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #ff4d4d; text-align: center; font-size: 0.9rem;">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <input type="text" name="username" placeholder="Identifiant" required>
                <input type="password" name="password" placeholder="Mot de passe" required>
                <button type="submit">SE CONNECTER</button>
            </form>
                        <p class="switch-text">Pas de compte ? <a href="/register">S'inscrire</a></p>
        </div>
    </div>

    {% if success %}
    <div id="overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgb(0, 0, 0); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
        <div style="border: 4px solid #46d369; border-radius: 50%; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px;">
            <span style="color: #46d369; font-size: 50px;">✔</span>
        </div>
        <h2 style="color: white; font-family: sans-serif;">Connexion réussie !</h2>
        <p style="color: #888; font-family: sans-serif;">Redirection vers votre catalogue...</p>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = "{{ url_for('index') }}";
        }, 2000);
    </script>
    {% endif %}
</body>
</html>
