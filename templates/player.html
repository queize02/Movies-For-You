<!DOCTYPE html>
<html>
<head>
    <title>Lecture</title>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; }
        .container { width: 80%; margin: auto; padding-top: 50px; }
        video, iframe { width: 100%; aspect-ratio: 16/9; border: none; }
        .btn { color: red; text-decoration: none; display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ film[1] }}</h1>

{% if 'youtube.com' in film[3] or 'embed' in film[3] or 'iframe' in film[3] %}            <!-- Si c'est un lien embed (YouTube, Vidoza, etc.) -->
            <iframe src="{{ film[3] }}" allowfullscreen></iframe>
        {% else %}
            <!-- Si c'est un lien direct vers un fichier vidéo -->
            <video controls autoplay>
                <source src="{{ film[3] }}" type="video/mp4">
                Votre navigateur ne supporte pas la lecture vidéo.
            </video>
        {% endif %}

        <a href="/" class="btn">Retour au catalogue</a>
    </div>
</body>
</html>
