<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/041b1dc342.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='movie-detail.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <title>{{ film['titre'] }} - MFY</title>
</head>
<body>
    
    <h1>{{ film['titre'] }}</h1>
    
    <div class="page-wrapper">
        <div class="video-container">
    {% if film.get('lien') and film['lien'] != 'auto' %}
      <iframe id="video-player"
    src="{{ film['lien'] }}" 
    width="100%" 
    frameborder="0" 
    allowfullscreen="true" 
    referrerpolicy="no-referrer"
    sandbox="allow-forms allow-scripts allow-same-origin"
    allow="autoplay; encrypted-media"> 
</iframe>
    {% else %}
        <iframe id="video-player"
            src="about:blank" 
            width="100%" 
            frameborder="0" 
            allowfullscreen="true" 
            referrerpolicy="no-referrer"> 
        </iframe>
    {% endif %}
</div>
    <details class="movie-description-dropdown" open>
        <summary>Description du film</summary>
        <div class="dropdown-content">
            <p>{{ film['description'] if film['description'] else "Aucune description disponible pour ce film." }}</p>
        </div>
    </details>

    <a href="{{ url_for('index') }}" class="back-button">← Retour au catalogue</a>
</body>
</html>
