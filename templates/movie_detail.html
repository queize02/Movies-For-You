<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <title>{{ film['titre'] }} - MFY</title>
</head>
<body style="background: #141414; color: white; font-family: sans-serif; text-align: center; padding: 40px 20px;">
    
    <h1 style="font-size: 2.5rem; margin-bottom: 20px; font-weight: bold; color: white;">{{ film['titre'] }}</h1>
    
<div style="margin: 30px auto; max-width: 800px; background: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.8); padding: 10px;">
    <iframe 
        id="main-video-player"
        src="https://www.vidking.net/movie/{{ film.tmdb_id }}" 
        width="100%" 
        height="500px" 
        allow="autoplay; fullscreen; encrypted-media" 
        frameborder="0"
        allowfullscreen>
    </iframe>
</div>

<div style="position: relative; width: 100%; max-width: 800px; margin: auto;">
    <iframe id="main-video-player" src="https://www.vidking.net/movie/{{ film['tmdb_id'] }}" width="100%" height="500px" frameborder="0" allowfullscreen></iframe>
    
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 450px; cursor: pointer;" 
         onclick="alert('Veuillez utiliser les contrôles de la vidéo !');">
    </div>
</div>


    <a href="{{ url_for('index') }}" style="color: #e50914; text-decoration: none; font-weight: bold; font-size: 1.1rem; border: 1px solid #e50914; padding: 10px 20px; border-radius: 4px; display: inline-block;">← Retour au catalogue</a>
</body>
</html>
