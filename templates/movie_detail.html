<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ movie[1] }} - MFY</title>
    <style>
        body { background-color: #000; color: white; margin: 0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .hero {
            position: relative; height: 80vh; display: flex; align-items: center; padding: 0 5%;
            background: linear-gradient(to right, #000 15%, transparent 100%), url('{{ movie[2] }}') no-repeat center top/cover;
        }
        .content { max-width: 700px; z-index: 2; }
        .title { font-size: 4.5rem; margin: 0; text-transform: uppercase; line-height: 1; }
        .meta { margin: 20px 0; font-weight: bold; color: #ccc; }
        .meta span { border: 1px solid #666; padding: 2px 8px; border-radius: 4px; margin-right: 10px; font-size: 0.9rem; }
        .desc { font-size: 1.3rem; line-height: 1.5; margin-bottom: 30px; text-shadow: 1px 1px 5px black; }
        .btn-play {
            background-color: white; color: black; padding: 15px 40px; border-radius: 5px;
            font-size: 1.3rem; font-weight: bold; text-decoration: none; transition: 0.3s;
        }
        .btn-play:hover { background-color: #e50914; color: white; }
        .video-container { background: #000; padding: 50px 5%; text-align: center; }
        iframe, video { width: 100%; max-width: 1000px; border-radius: 10px; box-shadow: 0 0 20px rgba(229, 9, 20, 0.5); }
    </style>
</head>
<body>
    <div class="hero">
        <div class="content">
            <h1 class="title">{{ movie[1] }}</h1>
            <div class="meta">
                <span>Nouveau</span><span>2026</span><span>18+</span><span>HD</span>
            </div>
            <p class="desc">{{ movie[4] if movie[4] else "Pas de description disponible pour ce film." }}</p>
            <a href="#player" class="btn-play">▶ LECTURE</a>
        </div>
    </div>

    <div id="player" class="video-container">
        {% if "youtube.com" in movie[3] or "youtu.be" in movie[3] %}
            <iframe height="560" src="{{ movie[3].replace('watch?v=', 'embed/') }}" frameborder="0" allowfullscreen></iframe>
        {% else %}
            <video controls><source src="{{ movie[3] }}" type="video/mp4"></video>
        {% endif %}
        <br><br>
        <a href="/" style="color: #666; text-decoration: none;">← Retour au catalogue</a>
    </div>
</body>
</html>
