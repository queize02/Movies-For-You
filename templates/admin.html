<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/Movies.png') }}">
    <title>Admin - Ajouter un film</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
    <style>
     
    </style>
</head>
<body>
    {% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <div style="color: #e50914; background: rgba(229, 9, 20, 0.1); padding: 10px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #e50914;">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}
    <div class="admin-container">
        <h1 >Ajouter un nouveau film</h1>
        <p>Entrez le titre exact, FlixMovies s'occupe de trouver l'affiche !</p>
        
        <form class="admin-form" method="POST">
            <input type="text" name="titre" placeholder="Titre du film (ex: Avatar)" required>
            <button type="submit" class="btn-submit">PUBLIER SUR LE SITE</button>
        </form>
        
        <a href="/" class="back-link">← Retour au catalogue</a>
    </div>
</body>
</html>
