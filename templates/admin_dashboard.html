<!DOCTYPE html>
<html lang="fr">
<body style="background: #141414; color: white; padding: 20px;">
    <h1>Films en attente</h1>
    <form method="POST" style="margin-bottom: 30px; padding: 20px; background: #222; border: 1px solid #e50914;">
        <input type="text" name="search_titre" placeholder="Rechercher un film à ajouter..." required>
        <button type="submit">Rechercher</button>
    </form>

    {% if search_results %}
    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
        {% for film in search_results %}
        <div style="text-align: center; border: 1px solid #555; padding: 10px;">
            <img src="https://image.tmdb.org/t/p/w200{{ film.poster_path }}" style="width: 100px;">
            <p>{{ film.title or film.name }}</p>
            <form action="/admin_valider_choix" method="POST">
                <input type="hidden" name="tmdb_id" value="{{ film.id }}">
                <input type="hidden" name="media_type" value="{{ film.media_type }}">
                <button type="submit">Ajouter</button>
            </form>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% for film in films %}
    <div style="border: 1px solid #444; padding: 10px; margin-bottom: 10px; display: flex; align-items: center;">
        <img src="{{ film['affiche'] }}" width="50" style="margin-right: 15px;">
        <p style="flex-grow: 1;"><strong>[{{ 'SÉRIE' if film.get('media_type') == 'tv' else 'FILM' }}]</strong> {{ film['titre'] }}</p>
        <form action="{{ url_for('admin_approuver_request', media_type=film.get('media_type', 'movie'), media_id=film['id']) }}" method="GET">
            <button type="submit" style="background: green; color: white; padding: 10px; border: none; cursor: pointer;">Approuver</button>
        </form>
        <form action="{{ url_for('admin_supprimer', media_type=film.get('media_type', 'movie'), media_id=film['id']) }}" method="POST" style="margin-left: 10px;">
            <button type="submit" style="background: #880000; color: white; border: none; padding: 10px; cursor: pointer;">Supprimer</button>
        </form>
    </div>
    {% endfor %}
    
</body>
</html>
