<!DOCTYPE html>
<html lang="fr">
<body style="background: #141414; color: white; padding: 20px;">
    <h1>Films en attente</h1>
    {% for film in films %}
    <div style="border: 1px solid #444; padding: 10px; margin-bottom: 10px; display: flex; align-items: center;">
        <img src="{{ film['affiche'] }}" width="50" style="margin-right: 15px;">
        <p style="flex-grow: 1;">{{ film['titre'] }}</p>
    <form action="{{ url_for('admin_approuver_request', movie_id=film['id']) }}" method="GET">
     <button type="submit" style="background: green; color: white; padding: 10px; border: none; cursor: pointer;">Approuver manuellement</button>
</form>
    </div>
    <form action="{{ url_for('admin_supprimer', movie_id=film['id']) }}" method="POST">
    <button type="submit" style="background: #880000; color: white; border: none; padding: 10px;">Supprimer</button>
</form>
    {% endfor %}
</body>
</html>
