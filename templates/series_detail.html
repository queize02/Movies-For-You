<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/041b1dc342.js" crossorigin="anonymous"></script>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <title>{{ film['titre'] }} - MFY</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
        }
        body {
            background: #141414;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: clamp(12px, 2vw, 32px) 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            font-size: clamp(2rem, 5vw, 2.8rem);
            margin-bottom: 18px;
            line-height: 1.1;
            max-width: 100%;
            word-wrap: break-word;
            padding: 0 8px;
        }
        .video-container {
            position: relative;
            width: min(100%, 900px);
            margin: 0 auto;
            padding-top: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(0,0,0,0.65);
        }
        .video-container iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        #tv-controls {
            margin: 18px auto 0;
            width: min(100%, 580px);
            max-width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
        }
        #tv-controls select {
            width: 100%;
            padding: 10px 12px;
            min-height: 38px;
            background: #232323;
            color: white;
            border: 2px solid #e50914;
            border-radius: 8px;
            font-size: clamp(0.88rem, 1vw, 1rem);
            line-height: 1.3;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }
        .movie-description-dropdown {
            width: min(100%, 900px);
            margin: 20px auto 0;
            text-align: left;
            background: #1f1f1f;
            padding: 16px;
            border-radius: 10px;
            cursor: pointer;
        }
        .movie-description-dropdown summary {
            font-weight: bold;
            color: #e50914;
            font-size: 1.2rem;
            list-style: none;
        }
        .movie-description-dropdown summary::-webkit-details-marker {
            display: none;
        }
        .movie-description-dropdown .dropdown-content p {
            margin: 0;
            color: #ccc;
            line-height: 1.7;
        }
        a.back-button {
            display: inline-block;
            margin: 24px auto 0;
            padding: 10px 18px;
            color: #e50914;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.98rem;
            border: 1px solid #e50914;
            border-radius: 8px;
        }
        @media (max-width: 768px) {
            body {
                padding: 18px 12px;
            }
            .video-container {
                padding-top: 62.5%;
            }
            .movie-description-dropdown {
                padding: 14px;
            }
            a.back-button {
                width: 100%;
                padding: 12px 14px;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 16px 10px;
            }
            #tv-controls {
                gap: 10px;
            }
            #tv-controls select {
                font-size: 0.95rem;
                padding: 10px 12px;
            }
            .movie-description-dropdown summary {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    
<h1>{{ film['titre'] }}</h1>
    
        <div class="video-container">
            <iframe id="video-player"
                src="about:blank"
                frameborder="0"
                allowfullscreen="true"
                referrerpolicy="no-referrer"
                sandbox="allow-forms allow-scripts allow-same-origin"
                allow="autoplay; encrypted-media">
            </iframe>
        </div>

        <div id="tv-controls">
            <select id="season-select"></select>
            <select id="episode-select"></select>
        </div>

        <div id="movie-data" data-tmdb-id="{{ film.tmdb_id }}" data-db-id="{{ film.id }}"></div>
        
        <script>
            const TMDB_API_KEY = "{{ TMDB_API_KEY }}";
            let db_episodes = {};
            const movieData = document.getElementById('movie-data');
            const tmdb_id = movieData.dataset.tmdbId;
            const db_id = movieData.dataset.dbId;
            const iframe = document.getElementById('video-player');
            
            fetch(`/api/episodes/${db_id}`)
                .then(res => res.json())
                .then(data => {
                    db_episodes = data;
                    // Charger les détails de la série après avoir récupéré les épisodes de la BDD
                    return fetch(`https://api.themoviedb.org/3/tv/${tmdb_id}?api_key=${TMDB_API_KEY}&language=fr-FR`);
                })
                .then(res => res.json())
                .then(data => {
                    const seasonSelect = document.getElementById('season-select');
                    data.seasons.forEach(s => {
                        if (s.season_number > 0) {
                            const opt = document.createElement('option');
                            opt.value = s.season_number;
                            opt.textContent = `Saison ${s.season_number}`;
                            seasonSelect.appendChild(opt);
                        }
                    });
                    
                    seasonSelect.addEventListener('change', (e) => {
                        loadEpisodes(e.target.value);
                    });
                    
                    if(data.seasons.find(s => s.season_number === 1)) {
                        seasonSelect.value = 1;
                        loadEpisodes(1);
                    } else if (data.seasons.length > 0) {
                        seasonSelect.value = data.seasons[0].season_number;
                        loadEpisodes(data.seasons[0].season_number);
                    }
                });
                
            function loadEpisodes(season_number) {
                fetch(`https://api.themoviedb.org/3/tv/${tmdb_id}/season/${season_number}?api_key=${TMDB_API_KEY}&language=fr-FR`)
                    .then(res => res.json())
                    .then(data => {
                        const episodeSelect = document.getElementById('episode-select');
                        episodeSelect.innerHTML = '';
                        if(data.episodes) {
                            data.episodes.forEach(e => {
                                const opt = document.createElement('option');
                                opt.value = e.episode_number;
                                opt.textContent = `Épisode ${e.episode_number} : ${e.name}`;
                                episodeSelect.appendChild(opt);
                            });
                            
                            episodeSelect.addEventListener('change', (e) => {
                                updatePlayer(season_number, e.target.value);
                            });
                            
                            if(data.episodes.length > 0) {
                                episodeSelect.value = data.episodes[0].episode_number;
                                updatePlayer(season_number, data.episodes[0].episode_number);
                            }
                        }
                    });
            }
            
            function updatePlayer(season, episode) {
                const episodeKey = `${season}-${episode}`;
                
                // 1. Vérifier si un lien VF a été extrait manuellement dans la base de données
                if (db_episodes[episodeKey]) {
                    iframe.src = db_episodes[episodeKey];
                } else {
                    // 2. Si l'épisode n'a pas encore été extrait, on affiche une page vide
                    iframe.src = "about:blank";
                }
            }
        </script>
    </div>
    
    <details class="movie-description-dropdown" open>
        <summary>Description du film</summary>
        <div class="dropdown-content">
            <p>{{ film['description'] if film['description'] else "Aucune description disponible pour cette série." }}</p>
        </div>
    </details>
    
    <a href="{{ url_for('index') }}" class="back-button">← Retour au catalogue</a>
</body>
</html>
