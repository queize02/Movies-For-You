<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajout Manuel - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
</head>
<body>

    <div class="admin-manual-wrapper">
        <div class="admin-manual-card">
        {% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <div class="flash-message">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}
        <h2 class="manual-title">🚀 Ajout Rapide Admin</h2>
        
        <form method="POST" class="manual-form">
            <div class="manual-field">
                <label>Nom du film :</label>
                <input type="text" name="titre" placeholder="Ex: Deadpool & Wolverine" required>
            </div>

            <div class="manual-field">
                <label>Lien de la vidéo :</label>
                <input type="text" name="lien" placeholder="Lien YouTube ou Embed" required>
            </div>

            <button type="submit" class="btn-submit">
                PUBLIER MAINTENANT
            </button>
        </form>

        <div class="manual-footer">
            <a href="/">← Retour à l'accueil</a>
        </div>
    </div>

</body>
</html>
