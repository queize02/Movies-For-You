<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajout Manuel - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body style="background: #141414; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div style="background: #1f1f1f; padding: 40px; border-radius: 15px; border: 1px solid #e50914; width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        {% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <div style="background: rgba(70, 211, 105, 0.2); color: #46d369; padding: 10px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #46d369;">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}
        <h2 style="color: #e50914; margin-bottom: 25px;">🚀 Ajout Rapide Admin</h2>
        
        <form method="POST">
            <div style="text-align: left; margin-bottom: 15px;">
                <label>Nom du film :</label>
                <input type="text" name="titre" placeholder="Ex: Deadpool & Wolverine" 
                       style="width: 100%; padding: 12px; margin-top: 5px; border-radius: 5px; border: none; background: #333; color: white;" required>
            </div>

            <div style="text-align: left; margin-bottom: 25px;">
                <label>Lien de la vidéo :</label>
                <input type="text" name="lien" placeholder="Lien YouTube ou Embed" 
                       style="width: 100%; padding: 12px; margin-top: 5px; border-radius: 5px; border: none; background: #333; color: white;" required>
            </div>

            <button type="submit" style="background: #e50914; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;">
                PUBLIER MAINTENANT
            </button>
        </form>

        <div style="margin-top: 20px;">
            <a href="/" style="color: #aaa; text-decoration: none; font-size: 14px;">← Retour à l'accueil</a>
        </div>
    </div>

</body>
</html>
