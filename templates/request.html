<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/Movies.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='request.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <title>Demander un film</title>
</head>
<body>
    <div class="container">
        <div class="request-box">
            <h2>Demander l'ajout d'un film</h2>
            
            <form action="/request" method="POST" class="request-form">
                <div class="request-field">
                    <label>Titre du film</label>
                    <input type="text" name="titre" placeholder="Titre du film" required>
                </div>
                
                <div class="request-field">
                    <label>Description</label>
                    <textarea name="description" placeholder="Expliquez ici votre demande (ex: Pourquoi ce film ? Précisions sur la version...)" rows="4"></textarea>
                </div>

                <button type="submit" class="request-submit">
                    Envoyer la demande
                </button>
            </form>
            
            <div class="request-footer">
                <a href="/">Retour à l'accueil</a>
            </div>
        </div>
    </div>
</body>
</html>
