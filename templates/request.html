<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/Movies.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='request.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <title>Demander un film</title>
</head>
<body>
    <div class="container">
        <div class="admin-box" style="background: #141414; padding: 20px; border-radius: 8px; margin-bottom: 40px; border: 1px solid #333;">
            <h2 style="margin-bottom: 15px; color: #e50914;">Demander l'ajout d'un film</h2>
            
            <form action="/request" method="POST" style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" name="titre" placeholder="Titre du film" required 
                       style="padding: 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: white;">
                
                <textarea name="description" placeholder="Expliquez ici votre demande (ex: Pourquoi ce film ? Précisions sur la version...)" 
                          rows="4" 
                          style="padding: 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: white; font-family: sans-serif; resize: none;"></textarea>

                <button type="submit" 
                        style="padding: 12px; border-radius: 4px; border: none; background: #e50914; color: white; font-weight: bold; cursor: pointer;">
                    Envoyer la demande
                </button>
            </form>
            
            <div style="margin-top: 15px; text-align: center;">
                <a href="/" style="color: #888; text-decoration: none; font-size: 14px;">Retour à l'accueil</a>
            </div>
        </div>
    </div>
</body>
</html>
