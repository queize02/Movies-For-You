<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finaliser l'ajout du film</title>
       <link rel="stylesheet" href="{{ url_for('static', filename='approve_form.css') }}">

</head>
<body>

    <form method="POST" action="{{ url_for('admin_approuver_request', movie_id=movie_id) }}">
    <input type="text" name="lien_final" id="lien_final" placeholder="Colle le lien ici">
<button type="button" onclick="collerLien()">Coller</button>

<script>
async function collerLien() {
    const text = await navigator.clipboard.readText();
    document.getElementById('lien_final').value = text;
}
</script>
</form>

</body>
</html>
